# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Dotnet Build and Test

on:
   push:
      branches: ["main"]
   pull_request:
      branches: ["main"]
   workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  dotnet-build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore ./EchoSharp.slnx

      - name: Download models
        run: |
          ./downloadModels.ps1
        shell: pwsh

      - name: Build
        run: dotnet build ./EchoSharp.slnx --no-restore

      - name: Test
        run: |
          dotnet test ./EchoSharp.slnx --no-build  --logger "trx"

      - name: Test Reporter
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2
        if: success() || failure()    # run this step even if previous step failed
        with:
          name: Whisper.net MacOs Test Results
          path: ./**/*.trx
          reporter: dotnet-trx

      - name: Upload trx files
        uses: actions/upload-artifact@v7
        if: success() || failure()    # run this step even if the previous step failed
        with:
          name: test-results-macos
          path: ./**/*.trx
          retention-days: 7
