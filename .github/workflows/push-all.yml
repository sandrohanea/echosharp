# This workflow pushes packed EchoSharp NuGet packages to nuget.org.

name: Push NuGet Packages to nuget.org

permissions:
  contents: write
  id-token: write

on:
  workflow_call:

jobs:
  push-nupkgs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Download Artifacts
        id: download-artifact
        uses: actions/download-artifact@v8
        with:
          name: nupkgs
          path: nupkgs

      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to nuget.org
        run: |
          # dotnet nuget push also uploads the matching .snupkg from the same directory.
          dotnet nuget push "./nupkgs/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}

      - name: Get version from package
        id: get-version
        shell: pwsh
        run: |
          $package = Get-ChildItem .\nupkgs -Filter *.nupkg | Sort-Object Name | Select-Object -First 1
          if ($null -eq $package) {
            throw "No .nupkg files were downloaded."
          }

          if ($package.BaseName -notmatch '\.(?<Version>\d+\.\d+\.\d+(?:-[A-Za-z0-9][A-Za-z0-9.-]*)?)$') {
            throw "Could not determine a semantic version from package '$($package.Name)'."
          }

          $version = $Matches.Version
          git config user.email "sandrohanea@users.noreply.github.com"
          git config user.name "Sandro Hanea (auto)"
          git tag -a "$version" -m "Release version $version"
          git push --tags
